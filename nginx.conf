upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Optimasi Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Penanganan Frontend HTML Files (Bypass Django)
    location /intelligence-engineering/ {
        alias /app/Frontend/;
        index login.html;
        try_files $uri $uri/ /intelligence-engineering/login.html;
    }

    # Penanganan API dan Admin ke Django Gunicorn
    location /intelligence-engineering/api/ {
        proxy_pass http://django_app/api/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /intelligence-engineering/admin/ {
        proxy_pass http://django_app/admin/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Penanganan Static Files Django (Admin, dll)
    location /intelligence-engineering/static/ {
        alias /app/Backend/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Penanganan Media Files (Uploads)
    location /intelligence-engineering/media/ {
        alias /app/Backend/mediafiles/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }
}
