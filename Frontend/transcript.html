<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript Project – Intelligence Engineering</title>
  <link rel="stylesheet" href="app-theme.css" />
  <style>
    /* ── Page Layout ── */
    .transcript-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 900px) { .transcript-layout { grid-template-columns: 1fr; } }

    /* ── Preview Panel ── */
    .preview-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .preview-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: linear-gradient(90deg, #f0f7ff, #e8f4ff);
      border-bottom: 1px solid var(--border);
    }
    .preview-toolbar-title {
      font-size: 0.78rem; font-weight: 700; color: var(--ocean);
      display: flex; align-items: center; gap: 0.45rem;
    }
    .preview-zoom { display: flex; align-items: center; gap: 0.35rem; }
    .zoom-btn {
      width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
      background: #fff; color: var(--ocean); cursor: pointer; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .zoom-btn:hover { background: var(--bg2); border-color: var(--cyan); }
    .zoom-level { font-size: 0.72rem; color: var(--muted); font-weight: 600; min-width: 38px; text-align: center; }

    /* A4 paper simulation */
    .paper-container {
      overflow: auto;
      max-height: calc(100vh - 200px);
      padding: 1.5rem;
      background: #e5e9ef;
    }
    .paper-container::-webkit-scrollbar { width: 6px; }
    .paper-container::-webkit-scrollbar-thumb { background: #c0cfe0; border-radius: 4px; }

    #paper-page {
      margin: 0 auto;
      background: #1a1a1a;
      color: #d4d4d4;
      width: 210mm;
      min-height: 297mm;
      padding: 25mm 22mm 25mm 22mm;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
      border-radius: 3px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12pt;
      transform-origin: top center;
      line-height: 1.7;
      transform-origin: top center;
      transition: transform 0.2s;
      position: relative;
      word-wrap: break-word;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    /* ── Transcript Typography ── */
    .tr-main-title {
      font-size: 20pt;
      font-weight: bold;
      text-transform: uppercase;
      text-align: left;
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
      border-bottom: 3px solid #d4d4d4;
      padding-bottom: 1rem;
      color: #e0e0e0;
    }
    .tr-section {
      margin-bottom: 1.5rem;
    }
    .tr-section-title {
      font-size: 14pt;
      font-weight: bold;
      text-transform: uppercase;
      color: #b0c4de;
      border-bottom: 1px solid #4a5a6a;
      padding-bottom: 0.3rem;
      margin-bottom: 0.75rem;
    }
    .tr-row {
      display: flex;
      margin-bottom: 0.35rem;
      font-size: 11pt;
    }
    .tr-label {
      min-width: 200px;
      color: #9badc0;
      font-style: italic;
      flex-shrink: 0;
    }
    .tr-value { color: #e0e0e0; min-width: 0; word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; }
    .tr-list-item {
      padding-left: 1.5rem;
      margin-bottom: 0.2rem;
      font-size: 11pt;
      color: #d0d0d0;
    }
    .tr-list-item::before { content: "• "; color: #7aacc8; }

    .tr-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; font-size: 0.95em; color: #d4d4d4; table-layout: fixed; }
    .tr-table th { border: 1px solid #555; padding: 6px; text-align: center; background: #2a3f54; color: #fff; font-weight: bold; word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; }
    .tr-table td { border: 1px solid #555; padding: 6px; word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; }

    /* Issue block */
    .tr-issue {
      margin-bottom: 1.2rem;
      padding: 0.75rem 1rem;
      border: 1px solid #333;
      border-radius: 4px;
      page-break-inside: avoid;
    }
    .tr-issue-title {
      font-size: 11.5pt;
      font-weight: bold;
      color: #b0c8e0;
      margin-bottom: 0.5rem;
    }
    .tr-issue-desc {
      font-size: 10.5pt;
      color: #bbb;
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }
    .tr-file-link {
      font-size: 10pt;
      color: #5ca4d4;
      text-decoration: underline;
      display: block;
      margin-bottom: 0.2rem;
    }
    .tr-no-issues {
      font-size: 10.5pt; color: #666; font-style: italic;
    }
    .tr-divider {
      border: none; border-top: 1px dashed #444;
      margin: 1rem 0;
    }
    .tr-watermark {
      position: absolute;
      bottom: 18mm; right: 18mm;
      font-size: 8pt;
      color: #444;
      font-style: italic;
    }
    .tr-page-num {
      position: absolute;
      bottom: 12mm; left: 50%;
      transform: translateX(-50%);
      font-size: 9pt;
      color: #555;
    }

    /* ── Right Control Panel ── */
    .ctrl-panel {
      display: flex; flex-direction: column; gap: 1rem;
      position: sticky; top: 74px;
    }
    .ctrl-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .ctrl-card-header {
      padding: 0.85rem 1.1rem;
      background: linear-gradient(90deg, #f0f7ff, #e8f4ff);
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem; font-weight: 700; color: var(--ocean);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .ctrl-card-body { padding: 1rem 1.1rem; }

    /* Download options */
    .dl-option {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.85rem; border: 1.5px solid var(--border);
      border-radius: 12px; cursor: pointer; transition: all 0.2s;
      margin-bottom: 0.75rem; background: #f8fbff;
    }
    .dl-option:hover { border-color: var(--cyan); background: #e8f4ff; }
    .dl-option input[type="radio"] { margin-top: 0.15rem; flex-shrink: 0; accent-color: var(--cyan); }
    .dl-option-label { font-size: 0.84rem; font-weight: 700; color: var(--ocean); margin-bottom: 0.2rem; }
    .dl-option-sub { font-size: 0.72rem; color: var(--muted); line-height: 1.4; }

    .btn-download {
      width: 100%; padding: 0.75rem 1rem;
      background: linear-gradient(135deg, #0d9488, #0891b2);
      color: #fff; border: none; border-radius: 10px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(13,148,136,0.3);
    }
    .btn-download:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(13,148,136,0.4); }
    .btn-download:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Project info card */
    .info-row {
      display: flex; justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f0f5fb;
      font-size: 0.8rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--muted); font-weight: 600; }
    .info-val { color: var(--text2); font-weight: 500; text-align: right; max-width: 160px; }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 40px; height: 40px; border: 3px solid #e0f0ff; border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 3rem auto; display: block; }

    /* Stat chips */
    .stat-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .stat-chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.7rem; font-weight: 700; padding: 0.22rem 0.6rem;
      border-radius: 20px; background: #e0f2fe; color: #0369a1;
    }
    .stat-chip.green { background: #dcfce7; color: #15803d; }
    .stat-chip.amber { background: #fef3c7; color: #b45309; }
  
      @media print {
        .app-sidebar, .app-topbar, .ctrl-panel, .preview-toolbar, #loading-state {
          display: none !important;
        }
        body, html, .app-layout, .app-main, .app-content, .transcript-layout, .preview-wrap, .paper-container {
          display: block !important;
          width: 100% !important;
          height: auto !important;
          margin: 0 !important;
          
          overflow: visible !important;
          background: transparent !important;
          border: none !important;
          box-shadow: none !important;
          max-height: none !important;
          position: static !important;
        }
        #paper-page {
          zoom: 1 !important;
          transform: none !important;
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 !important;
          
          box-shadow: none !important;
          background: #fff !important;
          color: #000 !important;
          min-height: auto !important;
        }
        .tr-row {
          page-break-inside: avoid;
        }
      }
    </style>
</head>
<body>
<div class="app-layout">
  <aside class="app-sidebar" id="sidebar"></aside>
  <main class="app-main">
    <div class="app-topbar">
      <button class="btn-back" onclick="history.back()">← Kembali</button>
      <div class="topbar-title-group">
        <div id="breadcrumb" style="font-size:0.72rem;color:var(--muted);">Projects</div>
        <h1 id="page-title" style="margin:0;font-size:1rem;color:var(--ocean);">Loading Transcript…</h1>
      </div>
    </div>

    <div class="app-content">
      <!-- Loading state -->
      <div id="loading-state">
        <div class="spinner"></div>
        <p style="text-align:center;color:var(--muted);font-size:0.85rem;">Memuat data transcript…</p>
      </div>

      <!-- Main content (hidden until loaded) -->
      <div id="main-content" style="display:none;">
        <div class="transcript-layout">

          <!-- LEFT: Paper Preview -->
          <div>
            <div class="preview-wrap">
              <div class="preview-toolbar">
                <div class="preview-toolbar-title">📄 Preview Transcript</div>
                <div class="preview-zoom">
                  <button class="zoom-btn" onclick="changeZoom(-10)" title="Zoom out">−</button>
                  <span class="zoom-level" id="zoom-label">75%</span>
                  <button class="zoom-btn" onclick="changeZoom(10)" title="Zoom in">+</button>
                </div>
              </div>
              <div class="paper-container" id="paper-container">
                <div id="paper-page">
                  <!-- Dynamically rendered -->
                </div>
              </div>
            </div>
          </div>

          <!-- RIGHT: Controls -->
          <div class="ctrl-panel">

            <!-- Project Info -->
            <div class="ctrl-card">
              <div class="ctrl-card-header">🗂️ Info Proyek</div>
              <div class="ctrl-card-body">
                <div id="proj-info-rows"></div>
              </div>
            </div>

            <!-- Stats -->
            <div class="ctrl-card">
              <div class="ctrl-card-header">📊 Ringkasan</div>
              <div class="ctrl-card-body">
                <div class="stat-chips" id="stat-chips"></div>
                <div id="issue-breakdown" style="font-size:0.78rem;color:var(--muted);"></div>
              </div>
            </div>

            <!-- Download Options -->
            <div class="ctrl-card">
              <div class="ctrl-card-header">⬇️ Download</div>
              <div class="ctrl-card-body">
                <label class="dl-option" for="opt-pdf">
                  <input type="radio" id="opt-pdf" name="dl-type" value="pdf" checked />
                  <div>
                    <div class="dl-option-label">📄 Dokumen (.pdf)</div>
                    <div class="dl-option-sub">Simpan transkrip sebagai file PDF.</div>
                  </div>
                </label>
                <label class="dl-option" for="opt-print">
                  <input type="radio" id="opt-print" name="dl-type" value="print" />
                  <div>
                    <div class="dl-option-label">🖨️ Print Langsung</div>
                    <div class="dl-option-sub">Cetak halaman menggunakan printer.</div>
                  </div>
                </label>
                <label class="dl-option" for="opt-all">
                  <input type="radio" id="opt-all" name="dl-type" value="all" />
                  <div>
                    <div class="dl-option-label">📦 Transkrip + File (.zip)</div>
                    <div class="dl-option-sub">Download ZIP berisi transkrip PDF dan semua lampiran.</div>
                  </div>
                </label>
                <button class="btn-download" id="btn-dl" onclick="doDownload()">
                  🚀 Proses
                </button>
              </div>
            </div>

            <!-- Creation Integration -->
            <div class="ctrl-card">
              <div class="ctrl-card-header">🌐 Integrasi Creation</div>
              <div class="ctrl-card-body" style="text-align: center;">
                <p style="font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem;">Kirim transkrip ini sebagai tiket submission baru ke Creation.</p>
                <button class="btn-download" id="btn-submit-creation" onclick="submitToCreation()" style="background: linear-gradient(135deg, #6366f1, #4f46e5);">
                  ✨ Submit ke Creation
                </button>
              </div>
            </div>

          </div>
        </div>
      </div><!-- /main-content -->
    </div>
  </main>
</div>

<!-- JSZip (CDN) for ZIP generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="app.js"></script>
<script src="sidebar.js"></script>
<script>
(async () => {
  if (!requireAuth()) return;

  const pid = new URLSearchParams(location.search).get('pid');
  if (!pid) return (location.href = 'projects.html');

  // ── Zoom ──────────────────────────────────────────────────────────────────
  let zoomPct = 75;
  function applyZoom() {
    const p = document.getElementById('paper-page');
    p.style.zoom = zoomPct / 100;
    document.getElementById('zoom-label').textContent = `${zoomPct}%`;
    // Native zoom handles layout recalculation automatically, so we don't need minHeight hacks.
    document.getElementById('paper-container').style.minHeight = 'auto';
  }
  window.changeZoom = (delta) => {
    zoomPct = Math.min(150, Math.max(30, zoomPct + delta));
    applyZoom();
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  function fmtDate(str) {
    if (!str) return '–';
    return new Date(str).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  }
  function fmtBytes(b) {
    if (!b) return '';
    if (b < 1024) return `${b} B`;
    if (b < 1024*1024) return `${(b/1024).toFixed(1)} KB`;
    return `${(b/1024/1024).toFixed(1)} MB`;
  }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function arr(v) { return Array.isArray(v) ? v : (typeof v === 'string' ? v.split('\n').filter(Boolean) : []); }

  // ── Load Data ─────────────────────────────────────────────────────────────
  let transcriptData = null;
  try {
    transcriptData = await apiFetch(`/projects/${pid}/transcript`);
  } catch(e) {
    document.getElementById('loading-state').innerHTML =
      `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Gagal memuat transcript: ${e.message}</p></div>`;
    return;
  }

  const { project, issues } = transcriptData;

  // Parse project meta (stored as JSON in description field)
  let meta = null;
  try { meta = JSON.parse(project.description); } catch {}
  const desc    = meta?.description || project.description || '–';
  const obj     = meta?.objectives  || {};
  const impl    = meta?.implementation || {};
  const plan    = meta?.planning || {};

  // ── Update topbar ─────────────────────────────────────────────────────────
  document.getElementById('breadcrumb').textContent = `Projects / ${project.name}`;
  document.getElementById('page-title').textContent = `Transcript – ${project.name}`;
  document.title = `Transcript – ${project.name}`;

  await renderSidebar('projects');

  // ── Project Info Card ─────────────────────────────────────────────────────
  const totalFiles = issues.reduce((acc,i) => acc + (i.attachments?.length||0), 0);
  document.getElementById('proj-info-rows').innerHTML = `
    <div class="info-row"><span class="info-key">Nama</span><span class="info-val">${esc(project.name)}</span></div>
    <div class="info-row"><span class="info-key">Key</span><span class="info-val">${esc(project.key)}</span></div>
    <div class="info-row"><span class="info-key">Tipe</span><span class="info-val">${esc(project.type)}</span></div>
    <div class="info-row"><span class="info-key">Status</span><span class="info-val">${esc(project.status)}</span></div>
    <div class="info-row"><span class="info-key">Owner</span><span class="info-val">${esc(project.owner_name||'–')}</span></div>
    <div class="info-row"><span class="info-key">Mulai</span><span class="info-val">${fmtDate(plan.startDate)}</span></div>
    <div class="info-row"><span class="info-key">Selesai</span><span class="info-val">${fmtDate(plan.endDate)}</span></div>
  `;

  // ── Stats ──────────────────────────────────────────────────────────────────
  const doneCount   = issues.filter(i=>i.status==='done').length;
  const openCount   = issues.filter(i=>i.status!=='done').length;
  document.getElementById('stat-chips').innerHTML = `
    <span class="stat-chip">${issues.length} Issues</span>
    <span class="stat-chip green">${doneCount} Done</span>
    <span class="stat-chip amber">${openCount} Open</span>
    <span class="stat-chip">${totalFiles} File</span>
  `;
  const byType = {};
  issues.forEach(i => { byType[i.type] = (byType[i.type]||0)+1; });
  document.getElementById('issue-breakdown').innerHTML = Object.entries(byType)
    .map(([t,c]) => `<div style="display:flex;justify-content:space-between;padding:0.2rem 0;border-bottom:1px solid #f0f5fb;">
      <span>${{task:'✅ Task',story:'📗 Story',bug:'🐛 Bug',epic:'⚡ Epic'}[t]||t}</span>
      <strong style="color:var(--ocean);">${c}</strong>
    </div>`).join('') || '<span style="color:var(--muted);font-size:0.78rem;">Tidak ada issue.</span>';

  // ── Build Paper HTML ──────────────────────────────────────────────────────
  function buildPaperHTML() {
    const orgObj     = obj.organizational || {};
    const indicators = arr(obj.leading_indicators);
    const outcomes   = obj.user_outcomes || {};
    const modelProps = obj.model_properties || {};
    const supervisors= arr(plan.supervisors);
    const now = new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});

    let html = `
      <div class="tr-main-title">TRANSKRIP PROJECT<br>"${esc(project.name)}"</div>
      <div style="font-size:9pt;color:#666;margin-bottom:1rem;">Digenerate: ${now}</div>

      <!-- PLANNING -->
      <div class="tr-section">
        <div class="tr-section-title">Planning</div>
        <div class="tr-row"><span class="tr-label">Start Date :</span><span class="tr-value">${esc(plan.startDate||'—')}</span></div>
        <div class="tr-row"><span class="tr-label">End Date :</span><span class="tr-value">${esc(plan.endDate||'—')}</span></div>
    `;
    if (supervisors.length) {
      html += `<div class="tr-row"><span class="tr-label">Supervisor :</span><span class="tr-value">`;
      html += supervisors.map((s,i) => (i===0 ? esc(s) : `</span></div><div class="tr-row"><span class="tr-label"></span><span class="tr-value">• ${esc(s)}`)).join('');
      html += `</span></div>`;
    } else {
      html += `<div class="tr-row"><span class="tr-label">Supervisor :</span><span class="tr-value">—</span></div>`;
    }
    html += `
        <div class="tr-row"><span class="tr-label">Deployment :</span><span class="tr-value">${esc(plan.deployment||'—')}</span></div>
        <div class="tr-row"><span class="tr-label">Maintenance :</span><span class="tr-value">${esc(plan.maintenance||'—')}</span></div>
        <div class="tr-row"><span class="tr-label">Operations :</span><span class="tr-value">${esc(plan.operations||'—')}</span></div>
      </div>

      <!-- OBJECTIVES -->
      <div class="tr-section">
        <div class="tr-section-title">Objectives</div>
        <div class="tr-row"><span class="tr-label">Organizational :</span><span class="tr-value"><b>Tujuan:</b> ${esc(orgObj.obj||'—')}<br><b>Cara:</b> ${esc(orgObj.how||'—')}<br><b>Ukuran:</b> ${esc(orgObj.measure||'—')}</span></div>
    `;
      if (indicators.length) {
        html += `<div class="tr-row" style="margin-top:0.5rem; display:block;">
          <div class="tr-label" style="margin-bottom:0.5rem;">Leading Indicator :</div>
          <table class="tr-table">
            <thead>
              <tr>
                <th>FITUR</th>
                <th>SISTEM KITA</th>
                <th>KOMPETITOR</th>
              </tr>
            </thead>
            <tbody>
              ${indicators.map(v => `<tr>
                <td>${esc(v.col1)}</td>
                <td>${esc(v.col2||'')}</td>
                <td>${esc(v.col3||'')}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
      }
      html += `
        <div class="tr-row" style="margin-top:0.5rem;"><span class="tr-label">User Outcomes :</span><span class="tr-value"><b>Tujuan:</b> ${esc(outcomes.obj||'—')}<br><b>Cara:</b> ${esc(outcomes.how||'—')}<br><b>Ukuran:</b> ${esc(outcomes.measure||'—')}</span></div>
        <div class="tr-row" style="margin-top:0.5rem;"><span class="tr-label">Model Properties :</span><span class="tr-value"><b>Spesifikasi:</b> ${esc(modelProps.obj||'—')}<br><b>Cara:</b> ${esc(modelProps.how||'—')}<br><b>Ukuran:</b> ${esc(modelProps.measure||'—')}</span></div>
      </div>
    `;

    // ISSUES
    html += `<div class="tr-section"><div class="tr-section-title">Issues (${issues.length})</div>`;
    if (!issues.length) {
      html += `<div class="tr-no-issues">Tidak ada issue dalam proyek ini.</div>`;
    } else {
      issues.forEach(issue => {
        const attachsHTML = (issue.attachments||[]).map(a =>
          `<a class="tr-file-link" href="${esc(a.file_url)}" target="_blank">📄 ${esc(a.original_name)} (${fmtBytes(a.size)})</a>`
        ).join('');
        
        const mo = issue.meaningful_objectives || {};
        const exp = issue.intelligence_experience || {};
        const imp = issue.intelligence_implementation || {};
        
        function renderTable(title, headers, rows) {
          if (!rows || !rows.length) return '';
          return `<div class="tr-row" style="margin-top:0.5rem; display:block;">
            <div class="tr-label" style="margin-bottom:0.5rem; color:var(--ocean); font-weight:bold;">${title} :</div>
            <table class="tr-table">
              <thead><tr>${headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead>
              <tbody>
                ${rows.map(r => `<tr>
                  <td>${esc(r.col1||'')}</td>
                  ${headers.length > 1 ? `<td>${esc(r.col2||'')}</td>` : ''}
                  ${headers.length > 2 ? `<td>${esc(r.col3||'')}</td>` : ''}
                </tr>`).join('')}
              </tbody>
            </table>
          </div>`;
        }

        let intelHTML = '';

        // 1. Meaningful Objectives (Issue)
        if (mo.organizational || mo.user_outcomes || mo.model_properties || (mo.leading_indicators && mo.leading_indicators.length)) {
          intelHTML += `<div style="margin-top:0.75rem;border-top:1px dashed #4a5a6a;padding-top:0.5rem;">`;
          intelHTML += `<div style="font-size:11pt;font-weight:700;color:#7aacc8;margin-bottom:0.5rem;text-transform:uppercase;">Meaningful Objectives</div>`;
          if (mo.organizational) {
            intelHTML += `<div class="tr-row" style="margin-top:0.25rem;"><span class="tr-label" style="min-width:140px;">Organizational :</span><span class="tr-value"><b>Tujuan:</b> ${esc(mo.organizational.obj||'—')}<br><b>Cara:</b> ${esc(mo.organizational.how||'—')}<br><b>Ukuran:</b> ${esc(mo.organizational.measure||'—')}</span></div>`;
          }
          if (mo.user_outcomes) {
            intelHTML += `<div class="tr-row" style="margin-top:0.25rem;"><span class="tr-label" style="min-width:140px;">User Outcomes :</span><span class="tr-value"><b>Tujuan:</b> ${esc(mo.user_outcomes.obj||'—')}<br><b>Cara:</b> ${esc(mo.user_outcomes.how||'—')}<br><b>Ukuran:</b> ${esc(mo.user_outcomes.measure||'—')}</span></div>`;
          }
          if (mo.model_properties) {
            intelHTML += `<div class="tr-row" style="margin-top:0.25rem;"><span class="tr-label" style="min-width:140px;">Model Properties :</span><span class="tr-value"><b>Spesifikasi:</b> ${esc(mo.model_properties.obj||'—')}<br><b>Cara:</b> ${esc(mo.model_properties.how||'—')}<br><b>Ukuran:</b> ${esc(mo.model_properties.measure||'—')}</span></div>`;
          }
          intelHTML += renderTable('Leading Indicators', ['FITUR', 'SISTEM KITA', 'KOMPETITOR'], mo.leading_indicators);
          intelHTML += `</div>`;
        }

        // 2. Intelligence Experiences
        if (exp.presentation || (exp.functions && exp.functions.length) || (exp.error_mitigation && exp.error_mitigation.length) || (exp.data_collection && exp.data_collection.length)) {
          intelHTML += `<div style="margin-top:0.75rem;border-top:1px dashed #4a5a6a;padding-top:0.5rem;">`;
          intelHTML += `<div style="font-size:11pt;font-weight:700;color:#7aacc8;margin-bottom:0.5rem;text-transform:uppercase;">Intelligence Experiences</div>`;
          
          if (exp.presentation) {
            intelHTML += `<div class="tr-row" style="margin-top:0.25rem; display:block;"><span class="tr-label">Presentation :</span><div class="tr-value" style="margin-top:0.2rem; padding-left:0.5rem; border-left:2px solid #555;"><b>Automate:</b> ${exp.presentation.automate?'Ya':'Tidak'}<br><b>Prompt:</b> ${exp.presentation.prompt?'Ya':'Tidak'}<br><b>Organisation:</b> ${exp.presentation.organisation?'Ya':'Tidak'}<br><b>Annotate:</b> ${exp.presentation.annotate?'Ya':'Tidak'}<br><b>Deskripsi:</b> ${esc(exp.presentation.desc||'—')}</div></div>`;
          }
          intelHTML += renderTable('Functions / Nama Fungsi', ['NAMA FUNGSI', 'DESKRIPSI'], exp.functions);
          intelHTML += renderTable('Error Mitigation', ['NAMA ERROR', 'STRATEGI MITIGASI'], exp.error_mitigation);
          intelHTML += renderTable('Data Collection', ['NAMA DATA', 'RENCANA PENGUMPULAN'], exp.data_collection);
          intelHTML += `</div>`;
        }

        // 3. Intelligence Implementation
        if ((imp.business_process && imp.business_process.length) || (imp.technology && imp.technology.length)) {
          intelHTML += `<div style="margin-top:0.75rem;border-top:1px dashed #4a5a6a;padding-top:0.5rem;">`;
          intelHTML += `<div style="font-size:11pt;font-weight:700;color:#7aacc8;margin-bottom:0.5rem;text-transform:uppercase;">Intelligence Implementation</div>`;
          intelHTML += renderTable('Business Process', ['NAMA PROSES', 'DESKRIPSI PROSES'], imp.business_process);
          intelHTML += renderTable('Technology', ['NAMA PROSES', 'TECH STACK'], imp.technology);
          intelHTML += `</div>`;
        }

          html += `
            <div class="tr-issue">
              <div class="tr-issue-title">"${esc(issue.issue_key)}" — ${esc(issue.title)}</div>
              <div class="tr-row" style="margin-bottom:0.25rem;">
                <span class="tr-label" style="min-width:120px;">Status :</span>
                <span class="tr-value">${esc(issue.status?.replace(/_/g,' ')||'–')}</span>
              </div>
              <div class="tr-row" style="margin-bottom:0.25rem;">
                <span class="tr-label" style="min-width:120px;">Priority :</span>
                <span class="tr-value">${esc(issue.priority||'–')}</span>
              </div>
              <div class="tr-row" style="margin-bottom:0.25rem;">
                <span class="tr-label" style="min-width:120px;">Assignee :</span>
                <span class="tr-value">${esc(issue.assignee_name||'Unassigned')}</span>
              </div>
              ${issue.description ? `<div class="tr-issue-desc">Description : ${esc(issue.description)}</div>` : ''}
              ${intelHTML}
              ${attachsHTML ? `<div style="margin-top:0.5rem;"><span style="color:#8aaccc;font-size:10pt;">File Lampiran :</span><br>${attachsHTML}</div>` : ''}
            </div>
          `;
      });
    }
    html += `</div>`;

    html += `
      <div class="tr-watermark">Intelligence Engineering PM · ${project.key}</div>
      <div class="tr-page-num">— 1 —</div>
    `;
    return html;
  }

  document.getElementById('paper-page').innerHTML = buildPaperHTML();
  applyZoom();

  // ── Show content ──────────────────────────────────────────────────────────
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  // ── Build plain-text transcript ───────────────────────────────────────────
  function buildPlainText() {
    const orgObj     = obj.organizational || {};
    const indicators = arr(obj.leading_indicators);
    const outcomes   = obj.user_outcomes || {};
    const modelProps = obj.model_properties || {};
    const supervisors= arr(plan.supervisors);
    const now = new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});

    let t = '';
    t += `TRANSKRIP PROJECT "${project.name}"\n`;
    t += `Digenerate: ${now}\n`;
    t += `${'='.repeat(60)}\n\n`;

    t += `PLANNING\n${'-'.repeat(40)}\n`;
    t += `Start Date         : ${plan.startDate||'—'}\n`;
    t += `End Date           : ${plan.endDate||'—'}\n`;
    t += `Supervisor         :\n${supervisors.map(s=>`  - ${s}`).join('\n')||'  —'}\n`;
    t += `Deployment         : ${plan.deployment||'—'}\n`;
    t += `Maintenance        : ${plan.maintenance||'—'}\n`;
    t += `Operations         : ${plan.operations||'—'}\n\n`;

    t += `OBJECTIVES\n${'-'.repeat(40)}\n`;
    t += `Organizational     :\n  Tujuan: ${orgObj.obj||'—'}\n  Cara: ${orgObj.how||'—'}\n  Ukuran: ${orgObj.measure||'—'}\n`;
    t += `Leading Indicators :\n${indicators.map(v=>`  - ${v.col1} (Kita: ${v.col2}, Komp: ${v.col3})`).join('\n')||'  —'}\n`;
    t += `User Outcomes      :\n  Tujuan: ${outcomes.obj||'—'}\n  Cara: ${outcomes.how||'—'}\n  Ukuran: ${outcomes.measure||'—'}\n`;
    t += `Model Properties   :\n  Spesifikasi: ${modelProps.obj||'—'}\n  Cara: ${modelProps.how||'—'}\n  Ukuran: ${modelProps.measure||'—'}\n\n`;

    t += `ISSUES (${issues.length})\n${'-'.repeat(40)}\n`;
    if (!issues.length) {
      t += 'Tidak ada issue.\n';
    } else {
      issues.forEach((issue, idx) => {
        t += `\n[${idx+1}] "${issue.issue_key}" — ${issue.title}\n`;
        t += `    Status   : ${(issue.status||'').replace(/_/g,' ')}\n`;
        t += `    Priority : ${issue.priority||'–'}\n`;
        t += `    Type     : ${issue.type||'–'}\n`;
        t += `    Assignee : ${issue.assignee_name||'Unassigned'}\n`;
        if (issue.description) t += `    Desc     : ${issue.description}\n`;
        if (issue.attachments?.length) {
          t += `    Files :\n`;
          issue.attachments.forEach(a => {
            t += `      - ${a.original_name} (${fmtBytes(a.size)}) → /uploads/${a.filename}\n`;
          });
        }
      });
    }
    t += `\n${'='.repeat(60)}\n`;
    t += `Intelligence Engineering PM · ${project.key}\n`;
    return t;
  }

  // ── Download ──────────────────────────────────────────────────────────────
  window.doDownload = async function() {
    const type = document.querySelector('input[name="dl-type"]:checked')?.value;
    
    if (type === 'print') {
      const oldZoom = zoomPct;
      zoomPct = 100;
      applyZoom();
      window.print();
      setTimeout(() => { zoomPct = oldZoom; applyZoom(); }, 500);
      return;
    }

    const btn  = document.getElementById('btn-dl');
    btn.disabled = true;
    btn.textContent = 'Memproses...';

    // Inject temporary print styles
    const printStyle = document.createElement('style');
    printStyle.innerHTML = `
      #paper-page { width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; min-height: auto !important; padding: 0 !important; box-shadow: none !important; background: #ffffff !important; color: #000000 !important; margin: 0 !important; transform: none !important; word-wrap: break-word !important; word-break: normal !important; overflow-wrap: break-word !important; }
      .tr-row { display: block !important; margin-bottom: 12px !important; max-width: 100% !important; page-break-inside: avoid !important; }
      .tr-label { display: block !important; font-weight: bold !important; color: #444 !important; margin-bottom: 4px !important; font-style: normal !important; page-break-after: avoid !important; }
      .tr-value { display: block !important; color: #000 !important; line-height: 1.6 !important; max-width: 100% !important; white-space: pre-wrap !important; word-break: normal !important; overflow-wrap: break-word !important; page-break-inside: avoid !important; }
      .tr-value br { display: block !important; content: "" !important; margin-bottom: 4px !important; }
      .tr-value b, .tr-value strong { color: #222 !important; }
      .tr-main-title { color: #000 !important; letter-spacing: 0 !important; border-bottom: 2px solid #000 !important; padding-bottom: 10px !important; margin-bottom: 20px !important; }
      .tr-section-title { color: #111 !important; border-bottom: 1px solid #ccc !important; letter-spacing: 0 !important; padding-bottom: 5px !important; margin-bottom: 10px !important; margin-top: 25px !important; page-break-after: avoid !important; }
      .tr-issue { border: 1px solid #ccc !important; padding: 15px !important; margin-bottom: 15px !important; page-break-inside: avoid !important; max-width: 100% !important; box-sizing: border-box !important; }
      .tr-issue-title { color: #0056b3 !important; font-size: 13pt !important; margin-bottom: 8px !important; word-break: normal !important; page-break-after: avoid !important; }
      .tr-issue-desc { color: #222 !important; max-width: 100% !important; white-space: pre-wrap !important; word-break: normal !important; }
      .tr-file-link { color: #0056b3 !important; text-decoration: none !important; }
      .tr-no-issues { color: #555 !important; }
      .tr-watermark { display: none !important; }
      .tr-table { color: #000 !important; table-layout: fixed !important; width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; page-break-inside: auto !important; }
      .tr-table tr { page-break-inside: avoid !important; page-break-after: auto !important; }
      .tr-table th { border: 1px solid #ccc !important; background: #2c3e50 !important; color: #fff !important; word-break: normal !important; white-space: pre-wrap !important; overflow-wrap: break-word !important; padding: 6px !important; }
      .tr-table td { border: 1px solid #ccc !important; color: #000 !important; word-break: normal !important; white-space: pre-wrap !important; overflow-wrap: break-word !important; padding: 6px !important; }
    `;
    document.head.appendChild(printStyle);

    try {
      const safeName = project.name.replace(/[^a-zA-Z0-9_-]/g, '_');
      const element = document.getElementById('paper-page');
      
      const opt = {
        margin:       15,
        filename:     `transcript_${safeName}.pdf`,
        image:        { type: 'jpeg', quality: 1.0 },
        html2canvas:  { scale: 2, useCORS: true, letterRendering: false },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      if (type === 'pdf') {
        if (typeof html2pdf === 'undefined') throw new Error('Library PDF belum dimuat. Coba refresh halaman.');
        await html2pdf().set(opt).from(element).save();
        showToast('PDF berhasil didownload!');
      } else {
        if (typeof JSZip === 'undefined' || typeof html2pdf === 'undefined') {
          throw new Error('JSZip atau PDF library belum dimuat.');
        }
        const zip = new JSZip();
        
        // Generate PDF as Blob
        const pdfBlob = await html2pdf().set(opt).from(element).outputPdf('blob');
        zip.file(`transcript_${safeName}.pdf`, pdfBlob);

        const allAtts = [];
        issues.forEach(issue => {
          (issue.attachments||[]).forEach(a => allAtts.push({ ...a, issueKey: issue.issue_key }));
        });

        if (allAtts.length) {
          const folder = zip.folder('uploads');
          let failedFiles = [];
          await Promise.all(allAtts.map(async (a) => {
            try {
              const res = await fetch(a.file_url);
              if (!res.ok) throw new Error("HTTP " + res.status);
              const blob = await res.blob();
              folder.file(a.issueKey + "_" + a.original_name, blob);
            } catch(e) { 
              console.warn('Could not fetch', a.original_name, e.message); 
              failedFiles.push(a.original_name);
            }
          }));
          if (failedFiles.length > 0) {
            alert("Beberapa lampiran gagal dimasukkan ke ZIP: \n" + failedFiles.join("\n") + "\n\nPastikan link file bisa dibuka secara langsung.");
          }
        }

        const content = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
        triggerDownload(content, `transcript_${safeName}.zip`);
        showToast(`ZIP berhasil didownload! (${allAtts.length} file)`);
      }
    } catch(e) {
      showToast('Gagal memproses: ' + e.message, 'error');
    } finally {
      document.head.removeChild(printStyle);
      btn.disabled = false;
      btn.innerHTML = '🚀 Proses';
    }
  };

  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  }

  // ✨ Submit to Creation ✨
  window.submitToCreation = async function() {
    const btn = document.getElementById('btn-submit-creation');
    btn.disabled = true;
    btn.textContent = 'Mengirim...';

    // Inject temporary print styles (same as download PDF)
    const printStyle = document.createElement('style');
    printStyle.innerHTML = `
      #paper-page { width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; min-height: auto !important; padding: 0 !important; box-shadow: none !important; background: #ffffff !important; color: #000000 !important; margin: 0 !important; transform: none !important; word-wrap: break-word !important; word-break: normal !important; overflow-wrap: break-word !important; }
      .tr-row { display: block !important; margin-bottom: 12px !important; max-width: 100% !important; page-break-inside: avoid !important; }
      .tr-label { display: block !important; font-weight: bold !important; color: #444 !important; margin-bottom: 4px !important; font-style: normal !important; page-break-after: avoid !important; }
      .tr-value { display: block !important; color: #000 !important; line-height: 1.6 !important; max-width: 100% !important; white-space: pre-wrap !important; word-break: normal !important; overflow-wrap: break-word !important; page-break-inside: avoid !important; }
      .tr-value br { display: block !important; content: "" !important; margin-bottom: 4px !important; }
      .tr-value b, .tr-value strong { color: #222 !important; }
      .tr-main-title { color: #000 !important; letter-spacing: 0 !important; border-bottom: 2px solid #000 !important; padding-bottom: 10px !important; margin-bottom: 20px !important; }
    `;
    document.head.appendChild(printStyle);

    try {
      const element = document.getElementById('paper-page');
      const safeName = (project.name || 'Project').replace(/[^a-z0-9]/gi, '_');
      
      const opt = {
        margin:       [0.5, 0.5, 0.5, 0.5],
        filename:     `transcript_${safeName}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, logging: false },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
      };

      if (typeof html2pdf === 'undefined') throw new Error('Library PDF belum dimuat. Coba refresh halaman.');
      
      const pdfBlob = await html2pdf().set(opt).from(element).outputPdf('blob');
      
      const formData = new FormData();
      formData.append('source_file', pdfBlob, `Transcript_${safeName}.pdf`);
      formData.append('title', `[IntRing] Transkrip Project ${project.name}`);
      formData.append('description', 'Auto-submitted transcript from Intelligence Engineering.\\n' + (project.description || ''));
      formData.append('contact_email', '');
      formData.append('urgency', 'high');
      formData.append('sender_name', user.name || 'IE Project Manager');
      formData.append('sender_team', 'Intelligence Engineering');

      const res = await fetch('/creation/api/v2/submissions/', {
        method: 'POST',
        body: formData,
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText || 'Gagal mengirim ke Creation.');
      }
      
      showToast('Berhasil dikirim ke Creation!');
    } catch(e) {
      showToast('Gagal mengirim: ' + e.message, 'error');
    } finally {
      document.head.removeChild(printStyle);
      btn.disabled = false;
      btn.innerHTML = '✨ Submit ke Creation';
    }
  };

})();
</script>
</body>
</html>
