<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backlog – Intelligence Engineering</title>
  <link rel="stylesheet" href="app-theme.css" />
</head>
<body>
<div class="app-layout">
  <aside class="app-sidebar" id="sidebar"></aside>
  <main class="app-main">
    <div class="app-topbar"><button class="btn-back" onclick="history.back()">← Kembali</button>
      <div class="topbar-title-group"><div class="breadcrumb"><a href="/projects.html">Proyek</a> / <span id="breadcrumb">—</span></div><h1 id="page-title">Backlog</h1></div>
      <button class="btn-outline" onclick="openCreateSprint()" style="padding:0.4rem 1rem;font-size:0.82rem;">+ Sprint</button>
      <button class="btn-primary" onclick="location.href=`create_issue.html?pid=${pid}`" style="padding:0.4rem 1rem;font-size:0.82rem;">+ Issue Cerdas</button>
    </div>
    <div class="app-content" id="backlog-content"></div>
  </main>
</div>

<!-- CREATE ISSUE -->
<div id="create-issue-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <div class="modal-title">✅ Create Issue</div>
    <div class="form-group"><label class="form-label">Title *</label><input id="ci-title" class="form-input" placeholder="Issue title" /></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <div class="form-group"><label class="form-label">Type</label>
        <select id="ci-type" class="form-select"><option value="task">✅ Task</option><option value="story">📗 Story</option><option value="bug">🐛 Bug</option><option value="epic">⚡ Epic</option></select>
      </div>
      <div class="form-group"><label class="form-label">Priority</label>
        <select id="ci-priority" class="form-select"><option value="low">🟢 Low</option><option value="medium" selected>🟡 Medium</option><option value="high">🟠 High</option><option value="critical">🔴 Critical</option></select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Assignee</label><select id="ci-assignee" class="form-select"><option value="">Unassigned</option></select></div>
    <div class="form-group"><label class="form-label">Sprint</label><select id="ci-sprint" class="form-select"><option value="">Backlog (no sprint)</option></select></div>
    <div class="form-group"><label class="form-label">Story Points</label><input id="ci-sp" type="number" class="form-input" placeholder="e.g. 5" min="1" /></div>
    <div class="form-group"><label class="form-label">Description</label><textarea id="ci-desc" class="form-textarea" rows="2" placeholder="Describe the issue..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-outline btn-sm" onclick="document.getElementById('create-issue-modal').style.display='none'">Cancel</button>
      <button class="btn-primary btn-sm" onclick="createIssue()">Create</button>
    </div>
  </div>
</div>

<!-- CREATE SPRINT -->
<div id="create-sprint-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <div class="modal-title">🏃 Create Sprint</div>
    <div class="form-group"><label class="form-label">Sprint Name *</label><input id="cs-name" class="form-input" placeholder="e.g. Sprint 3 – Analytics" /></div>
    <div class="form-group"><label class="form-label">Goal</label><input id="cs-goal" class="form-input" placeholder="What will be achieved?" /></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <div class="form-group"><label class="form-label">Start Date</label><input id="cs-start" type="date" class="form-input" /></div>
      <div class="form-group"><label class="form-label">End Date</label><input id="cs-end" type="date" class="form-input" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-outline btn-sm" onclick="document.getElementById('create-sprint-modal').style.display='none'">Cancel</button>
      <button class="btn-primary btn-sm" onclick="createSprint()">Create Sprint</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="sidebar.js"></script>
<script>
  requireAuth();
  const pid = new URLSearchParams(location.search).get('pid');
  if (!pid) location.href = '/projects.html';

  let sprints = [], members = [], project = {};

  async function init() {
    [project, sprints, members] = await Promise.all([
      apiFetch(`/projects/${pid}`),
      apiFetch(`/projects/${pid}/sprints`),
      apiFetch(`/projects/${pid}/members`),
    ]);
    document.title = `${project.name} Backlog – Intelligence Engineering`;
    document.getElementById('breadcrumb').textContent = project.name;
    renderSidebar('backlog', pid);

    // Populate ci-assignee, ci-sprint
    document.getElementById('ci-assignee').innerHTML = '<option value="">Unassigned</option>' + members.map(m => `<option value="${m.id}">${m.avatar||'🙂'} ${m.name}</option>`).join('');
    document.getElementById('ci-sprint').innerHTML = '<option value="">Backlog (no sprint)</option>' + sprints.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

    await renderBacklog();
  }

  async function renderBacklog() {
    const content = document.getElementById('backlog-content');
    const [sprintIssues, backlogIssues] = await Promise.all([
      apiFetch(`/projects/${pid}/issues`),
      apiFetch(`/projects/${pid}/issues?backlog=true`),
    ]);

    // Group by sprint
    const bySprintId = {};
    sprintIssues.forEach(i => {
      if (i.sprint_id) { bySprintId[i.sprint_id] = bySprintId[i.sprint_id]||[]; bySprintId[i.sprint_id].push(i); }
    });

    let html = '';
    sprints.forEach(s => {
      const issues = bySprintId[s.id] || [];
      const done = issues.filter(i=>i.status==='done').length;
      html += `
        <div class="sprint-block">
          <div class="sprint-header" onclick="toggleSprint('sprint-${s.id}')">
            <span class="sprint-chevron open" id="chev-sprint-${s.id}">▶</span>
            <span class="sprint-name">${s.name}</span>
            <span class="sprint-status-badge ${s.status}">${s.status}</span>
            <span class="sprint-meta">${formatDate(s.start_date)} – ${formatDate(s.end_date)}</span>
            <span class="sprint-meta">${done}/${issues.length} done</span>
            ${s.status==='planning'?`<button onclick="event.stopPropagation();startSprint(${s.id})" class="btn-sm" style="background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3);margin-left:0.5rem;">▶ Start</button>`:''}
            ${s.status==='active'?`<button onclick="event.stopPropagation();completeSprint(${s.id})" class="btn-sm" style="background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);margin-left:0.5rem;">✓ Complete</button>`:''}
            <button onclick="event.stopPropagation();location.href=\`create_issue.html?pid=${pid}&sprint=${s.id}\`" class="btn-sm" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);margin-left:0.25rem;">+ Issue Cerdas</button>
          </div>
          <div class="sprint-body" id="sprint-${s.id}">
            ${issues.length ? issues.map(i => issueRow(i)).join('') : '<div class="empty-state" style="padding:1.5rem;"><p>No issues in this sprint. Add some from the backlog.</p></div>'}
          </div>
        </div>
      `;
    });

    // Backlog
    html += `
      <div class="sprint-block">
        <div class="sprint-header" onclick="toggleSprint('sprint-backlog')">
          <span class="sprint-chevron open" id="chev-sprint-backlog">▶</span>
          <span class="sprint-name">📋 Backlog</span>
          <span class="sprint-meta">${backlogIssues.length} issues</span>
        </div>
        <div class="sprint-body" id="sprint-backlog">
          ${backlogIssues.length ? backlogIssues.map(i => issueRow(i)).join('') : '<div class="empty-state" style="padding:1.5rem;"><div class="empty-state-icon">📋</div><p>No backlog issues. Create your first issue!</p></div>'}
        </div>
      </div>
    `;

    content.innerHTML = html;
  }

  function issueRow(i) {
    return `
      <div class="backlog-issue-row" onclick="location.href='/issue.html?id=${i.id}'">
        <div class="priority-dot" style="background:${PRIORITY_COLOR[i.priority]};"></div>
        <span style="font-size:0.9rem;">${TYPE_ICON[i.type]||'✅'}</span>
        <span class="issue-key-badge">${i.issue_key}</span>
        <span class="issue-title-text">${i.title}</span>
        <span class="badge badge-${i.status}">${STATUS_LABEL[i.status]}</span>
        <div class="assignee-chip">
          <span>${i.assignee_avatar||'👤'}</span>
          <span>${i.assignee_name||'Unassigned'}</span>
        </div>
        ${i.story_points?`<span style="font-size:0.72rem;color:var(--text-muted);background:rgba(255,255,255,0.06);border-radius:4px;padding:0.1rem 0.4rem;">${i.story_points}sp</span>`:''}
      </div>
    `;
  }

  function toggleSprint(id) {
    const body = document.getElementById(id);
    const chev = document.getElementById('chev-'+id);
    const open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    chev.classList.toggle('open', !open);
  }

  async function startSprint(id) {
    const sprint = sprints.find(s=>s.id===id);
    await apiFetch(`/sprints/${id}`, { method:'PUT', body:{...sprint, status:'active'} });
    showToast('Sprint started!'); init();
  }
  async function completeSprint(id) {
    const sprint = sprints.find(s=>s.id===id);
    await apiFetch(`/sprints/${id}`, { method:'PUT', body:{...sprint, status:'done'} });
    showToast('Sprint completed!'); init();
  }

  function openCreateIssue(sprintId) {
    if (sprintId) document.getElementById('ci-sprint').value = sprintId;
    document.getElementById('create-issue-modal').style.display = 'flex';
  }
  function openCreateSprint() { document.getElementById('create-sprint-modal').style.display = 'flex'; }

  async function createIssue() {
    const title = document.getElementById('ci-title').value.trim();
    if (!title) return showToast('Title is required', 'error');
    try {
      await apiFetch(`/projects/${pid}/issues`, { method: 'POST', body: {
        title, type: document.getElementById('ci-type').value,
        priority: document.getElementById('ci-priority').value,
        assignee_id: document.getElementById('ci-assignee').value || null,
        sprint_id: document.getElementById('ci-sprint').value || null,
        story_points: document.getElementById('ci-sp').value || null,
        description: document.getElementById('ci-desc').value,
      }});
      document.getElementById('create-issue-modal').style.display = 'none';
      document.getElementById('ci-title').value = '';
      showToast('Issue created!'); renderBacklog();
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function createSprint() {
    const name = document.getElementById('cs-name').value.trim();
    if (!name) return showToast('Sprint name required', 'error');
    try {
      await apiFetch(`/projects/${pid}/sprints`, { method: 'POST', body: {
        name, goal: document.getElementById('cs-goal').value,
        start_date: document.getElementById('cs-start').value,
        end_date: document.getElementById('cs-end').value,
      }});
      document.getElementById('create-sprint-modal').style.display = 'none';
      showToast('Sprint created!'); init();
    } catch(e) { showToast(e.message, 'error'); }
  }

  init();
</script>
</body>
</html>
