<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}IntRing PM{% endblock %} — Intelligence Engineering</title>
  <!-- Bootstrap 4 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ocean:   #023e8a;
      --blue:    #0077b6;
      --cyan:    #0096c7;
      --sky:     #48cae4;
      --bg:      #f0f7ff;
      --white:   #ffffff;
      --border:  #c8e6fa;
      --text:    #0d2d4a;
      --muted:   #6c8ba8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .navbar-brand { font-weight: 800; letter-spacing: -0.5px; }
    .sidebar {
      background: linear-gradient(180deg, #023e8a 0%, #0077b6 55%, #0096c7 100%);
      min-height: 100vh;
      padding: 0;
    }
    .sidebar-brand {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      font-size: 1.05rem;
      font-weight: 800;
      color: #fff;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .sidebar-brand-icon {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-section-label {
      font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: rgba(255,255,255,0.45);
      padding: 1rem 1.25rem 0.3rem;
    }
    .sidebar .nav-link {
      color: rgba(255,255,255,0.75);
      padding: 0.5rem 1.25rem;
      border-radius: 0;
      font-size: 0.875rem;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .sidebar .nav-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar .nav-link.active { background: rgba(255,255,255,0.18); color: #fff; font-weight: 600; }
    .main-content { background: var(--bg); min-height: 100vh; }
    .page-header {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      position: sticky; top: 0; z-index: 100;
    }
    .page-header h1 { font-size: 1.2rem; font-weight: 800; color: var(--ocean); margin: 0; }
    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,100,180,0.08);
    }
    .card-header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      border-radius: 14px 14px 0 0 !important;
      font-weight: 700; color: var(--ocean);
    }
    .btn-primary { background: linear-gradient(135deg, #0077b6, #48cae4); border: none; font-weight: 600; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-ocean { background: var(--ocean); color: #fff; border: none; font-weight: 600; }
    .badge-publish { background: #dcfce7; color: #15803d; }
    .badge-not_publish { background: #fee2e2; color: #b91c1c; }
    .table th { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .table td { vertical-align: middle; }
    .stat-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; }
    .stat-card-value { font-size: 2rem; font-weight: 900; background: linear-gradient(135deg,#0077b6,#48cae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-card-label { font-size: 0.72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .alert { border-radius: 10px; }
    /* crispy form tweaks */
    .form-control { border-color: var(--border); border-radius: 8px; }
    .form-control:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,150,199,0.12); }
    label { font-size: 0.82rem; font-weight: 600; color: var(--text); }
    .article-editor { font-family: 'Inter', monospace; line-height: 1.7; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<div class="container-fluid p-0">
  <div class="row no-gutters">
    <!-- Sidebar -->
    <div class="col-2 sidebar d-flex flex-column">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">⚡</div>
        IntRing PM
      </div>

      <div class="sidebar-section-label">PM App</div>
      <nav class="nav flex-column">
        <a class="nav-link {% block nav_dashboard %}{% endblock %}" href="http://localhost:3000/dashboard.html">
          <i class="bi bi-house-fill"></i> Dashboard
        </a>
        <a class="nav-link {% block nav_projects %}{% endblock %}" href="http://localhost:3000/projects.html">
          <i class="bi bi-folder2-open"></i> Proyek
        </a>
        <a class="nav-link {% block nav_board %}{% endblock %}" href="http://localhost:3000/board.html">
          <i class="bi bi-kanban"></i> Board
        </a>
      </nav>

      <div class="sidebar-section-label">Data Entry</div>
      <nav class="nav flex-column">
        <a class="nav-link {% block nav_data_entry %}{% endblock %}" href="{% url 'data_entry_index' %}">
          <i class="bi bi-grid-1x2"></i> Overview
        </a>
        <a class="nav-link {% block nav_pengguna %}{% endblock %}" href="{% url 'pengguna_list' %}">
          <i class="bi bi-people-fill"></i> Pengguna
        </a>
        <a class="nav-link {% block nav_content %}{% endblock %}" href="{% url 'content_list' %}">
          <i class="bi bi-file-earmark-text-fill"></i> Konten
        </a>
      </nav>

      <div class="sidebar-section-label">Admin</div>
      <nav class="nav flex-column">
        <a class="nav-link" href="/admin/" target="_blank">
          <i class="bi bi-gear-fill"></i> Django Admin
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="col-10 main-content">
      {% if messages %}
        <div style="position:fixed;top:1rem;right:1rem;z-index:9999;min-width:300px;">
          {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show shadow">
              {{ message }}
              <button type="button" class="close" data-dismiss="alert"><span>×</span></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
